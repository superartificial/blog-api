spring.application.name=Blog

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/blog
spring.datasource.username=bloguser
spring.datasource.password=localdevpassword
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.locations=classpath:db/migration

# Server
server.port=8080

# JWT
jwt.secret=${JWT_SECRET:iMWTMWW5QobusZyPzeKObNoWk7bdSCdbz7TXqfTkM/cZSWYXDe1/YAzpFfA1FuM/6/LWC90hh59yshnUL5Q8UA==}
jwt.expiration=86400000

# Logging
logging.level.root=INFO
logging.level.nz.clem.blog=DEBUG
# R2 image storage (dev — override with real values via env or local config)
r2.endpoint=${R2_ENDPOINT:https://placeholder.r2.cloudflarestorage.com}
r2.access-key=${R2_ACCESS_KEY:placeholder}
r2.secret-key=${R2_SECRET_KEY:placeholder}
r2.bucket=${R2_BUCKET:placeholder}
r2.public-url=${R2_PUBLIC_URL:https://placeholder.example.com}

# Contact form email notifications
# Set these (and spring.mail.*) to enable email alerts on new submissions.
# Leave unset in dev to disable sending (form still saves to DB).
# contact.email.to=your@email.com
# contact.email.from=noreply@clem.nz
# spring.mail.host=smtp.example.com
# spring.mail.port=587
# spring.mail.username=your@email.com
# spring.mail.password=yourpassword
# spring.mail.properties.mail.smtp.auth=true
# spring.mail.properties.mail.smtp.starttls.enable=true

contact.email.to=you@example.com
contact.email.from=noreply@clem.nz
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# Multipart upload limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
